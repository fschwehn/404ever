<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Flow State — April 1, 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0e0c0a;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }

  .overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .title-block {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 20;
    mix-blend-mode: screen;
    animation: fadeInUp 3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeInUp {
    0%   { opacity: 0; transform: translate(-50%, calc(-50% + 20px)); }
    30%  { opacity: 1; }
    70%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, calc(-50% - 10px)); }
  }

  .title-block h1 {
    font-size: clamp(1.1rem, 3vw, 2rem);
    font-weight: 400;
    color: rgba(255, 220, 170, 0.85);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    line-height: 1.5;
    text-shadow: 0 0 40px rgba(255,180,80,0.4);
  }

  .title-block p {
    font-size: clamp(0.6rem, 1.5vw, 0.85rem);
    color: rgba(255, 200, 130, 0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 0.6rem;
  }

  /* corner notes */
  .corner {
    position: fixed;
    font-size: 0.58rem;
    color: rgba(255, 200, 130, 0.22);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 20;
    pointer-events: none;
  }
  .corner.tl { top: 1.4rem; left: 1.4rem; }
  .corner.tr { top: 1.4rem; right: 1.4rem; text-align: right; }
  .corner.bl { bottom: 1.4rem; left: 1.4rem; }

  .corner.tr {
    pointer-events: auto;
    cursor: default;
  }

  /* click hint */
  .hint {
    position: fixed;
    bottom: 1.4rem;
    right: 1.4rem;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,200,130,0.18);
    z-index: 20;
    pointer-events: none;
    transition: color 0.4s;
  }

  /* history */
  .history-link {
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    font-size: 0.55rem;
    color: rgba(255, 200, 130, 0.18);
    text-decoration: none;
    z-index: 200;
    letter-spacing: 0.1em;
    font-family: 'Georgia', serif;
    transition: color 0.3s;
    pointer-events: auto;
  }
  .history-link:hover { color: rgba(255, 200, 130, 0.55); }

  /* message layer */
  .message {
    position: fixed;
    bottom: 3.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 210, 150, 0.0);
    text-align: center;
    line-height: 2;
    z-index: 20;
    pointer-events: none;
    transition: color 1.2s ease;
    white-space: nowrap;
  }
  .message.show {
    color: rgba(255, 210, 150, 0.65);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="title-block" id="titleBlock">
  <h1>April 1, 2026</h1>
  <p>full pink moon &nbsp;·&nbsp; artemis ii launches &nbsp;·&nbsp; april fools</p>
</div>

<div class="corner tl">flow state</div>
<div class="corner tr" id="particleCount">— particles</div>

<div class="message" id="msg"></div>
<div class="hint">click to seed</div>

<a href="../history.html" class="history-link">history</a>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // ── palette: earthy spring + moon glow ──
  const PALETTE = [
    [255, 160,  60],  // amber
    [220, 100,  60],  // terracotta
    [180,  90, 130],  // dusty rose
    [100, 140, 200],  // moonlit blue
    [210, 190, 110],  // pollen yellow
    [140, 180, 140],  // sage
    [255, 200, 120],  // warm gold
    [ 90, 110, 170],  // indigo dusk
  ];

  // ── noise (simple value noise) ──
  const PERM = new Uint8Array(512);
  function seedNoise(s) {
    // simple LCG shuffle
    let r = s | 0;
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    for (let i = 255; i > 0; i--) {
      r = (Math.imul(r, 1664525) + 1013904223) | 0;
      const j = (r >>> 0) % (i + 1);
      [p[i], p[j]] = [p[j], p[i]];
    }
    for (let i = 0; i < 512; i++) PERM[i] = p[i & 255];
  }

  function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
  function lerp(a, b, t) { return a + t * (b - a); }
  function grad(h, x, y) {
    const u = h < 8 ? x : y, v = h < 4 ? y : h === 12 || h === 14 ? x : 0;
    return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
  }

  function noise2(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = fade(x), v = fade(y);
    const a  = PERM[X] + Y,   b  = PERM[X+1] + Y;
    return lerp(
      lerp(grad(PERM[a],   x,   y), grad(PERM[b],   x-1, y),   u),
      lerp(grad(PERM[a+1], x,   y-1), grad(PERM[b+1], x-1, y-1), u),
      v
    );
  }

  // ── resize ──
  let W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // darken fill
    ctx.fillStyle = '#0e0c0a';
    ctx.fillRect(0, 0, W, H);
  }
  window.addEventListener('resize', () => { resize(); initParticles(); });

  // ── particles ──
  const N = 2800;
  let particles = [];
  let tick = 0;
  let noiseSeed = (Math.random() * 9999) | 0;

  function mkParticle(i) {
    const ci = i % PALETTE.length;
    const [r, g, b] = PALETTE[ci];
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: 0, vy: 0,
      age: Math.random() * 300,
      maxAge: 200 + Math.random() * 400,
      r, g, b,
      alpha: 0.12 + Math.random() * 0.22,
      size: 0.6 + Math.random() * 1.4,
    };
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < N; i++) particles.push(mkParticle(i));
  }

  // ── flow field ──
  const SCALE  = 0.0025;
  const SPEED  = 1.1;
  const TWO_PI = Math.PI * 2;

  function fieldAngle(x, y, t) {
    const n1 = noise2(x * SCALE + t * 0.08,  y * SCALE);
    const n2 = noise2(x * SCALE,              y * SCALE + t * 0.06 + 40);
    return (n1 + n2) * TWO_PI * 1.8;
  }

  // ── draw loop ──
  let frameId;
  function draw() {
    frameId = requestAnimationFrame(draw);
    tick++;

    // subtle fade trail
    ctx.fillStyle = 'rgba(14, 12, 10, 0.018)';
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < N; i++) {
      const p = particles[i];
      const angle = fieldAngle(p.x, p.y, tick);
      p.vx = p.vx * 0.85 + Math.cos(angle) * SPEED * 0.15;
      p.vy = p.vy * 0.85 + Math.sin(angle) * SPEED * 0.15;
      p.x += p.vx;
      p.y += p.vy;
      p.age++;

      // wrap
      if (p.x < -5) p.x = W + 5;
      if (p.x > W + 5) p.x = -5;
      if (p.y < -5) p.y = H + 5;
      if (p.y > H + 5) p.y = -5;

      // respawn
      if (p.age > p.maxAge) {
        particles[i] = mkParticle(i);
        continue;
      }

      // fade in/out
      const progress = p.age / p.maxAge;
      const envelope = progress < 0.15
        ? progress / 0.15
        : progress > 0.8
          ? (1 - progress) / 0.2
          : 1;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, TWO_PI);
      ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha * envelope})`;
      ctx.fill();
    }

    // update counter every 60 frames
    if (tick % 60 === 0) {
      document.getElementById('particleCount').textContent = N.toLocaleString() + ' particles';
    }
  }

  // ── messages (cycle on click) ──
  const messages = [
    'artemis ii · first crewed deep-space mission since 1972',
    'full pink moon · peak 10:12 pm et',
    'april 1, 1976 · apple was founded',
    'april 1 · passover begins',
    'april fools · everything might be a prank',
    'year of the horse · fire season',
    'nothing is fixed · everything flows',
    'the tide feels this too',
  ];
  let mi = 0;
  let msgTimer = null;
  const msgEl = document.getElementById('msg');

  window.addEventListener('click', () => {
    seedNoise(Math.random() * 99999 | 0);
    initParticles();

    msgEl.textContent = messages[mi % messages.length];
    mi++;
    msgEl.classList.add('show');
    if (msgTimer) clearTimeout(msgTimer);
    msgTimer = setTimeout(() => msgEl.classList.remove('show'), 3500);
  });

  // ── init ──
  seedNoise(noiseSeed);
  resize();
  initParticles();
  draw();

  // hide title after animation completes
  const titleBlock = document.getElementById('titleBlock');
  setTimeout(() => { titleBlock.style.display = 'none'; }, 3200);

})();
</script>
</body>
</html>
