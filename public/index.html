<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Earth Hour — The Stars Remember</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0a0a12;
    --dim: #0e0e1a;
    --gold: #f5d08a;
    --pink: #f9b4c8;
    --blue: #7ab3e0;
    --green: #6ec99a;
    --white: #e8e8f0;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--ink);
    font-family: 'Georgia', serif;
    color: var(--white);
  }

  canvas#sky {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #ui {
    position: fixed;
    z-index: 10;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  #headline {
    font-size: clamp(1.8rem, 5vw, 3.8rem);
    letter-spacing: 0.05em;
    text-align: center;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(245,208,138,0.4);
    opacity: 0;
    animation: fadeIn 3s ease 0.5s forwards;
    line-height: 1.2;
    padding: 0 1rem;
  }

  #sub {
    margin-top: 1.2rem;
    font-size: clamp(0.85rem, 2vw, 1.15rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--blue);
    text-align: center;
    opacity: 0;
    animation: fadeIn 3s ease 2s forwards;
    padding: 0 1rem;
  }

  #clock {
    margin-top: 2.5rem;
    font-size: clamp(3rem, 9vw, 6rem);
    font-family: 'Courier New', monospace;
    letter-spacing: 0.08em;
    color: var(--white);
    text-shadow: 0 0 30px rgba(200,200,255,0.25);
    opacity: 0;
    animation: fadeIn 3s ease 2.5s forwards;
  }

  #date-line {
    margin-top: 0.6rem;
    font-size: clamp(0.7rem, 1.5vw, 0.95rem);
    color: #6a7080;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 2s ease 3.5s forwards;
  }

  #earth-hour-badge {
    margin-top: 2.8rem;
    padding: 0.7rem 2rem;
    border: 1px solid rgba(245,208,138,0.3);
    border-radius: 2rem;
    background: rgba(245,208,138,0.06);
    font-size: clamp(0.75rem, 1.6vw, 0.9rem);
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0;
    animation: pulseGold 4s ease 4s infinite;
  }

  #hint {
    position: fixed;
    bottom: 3.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    color: #4a4a60;
    text-transform: uppercase;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 2s ease 5s forwards;
    white-space: nowrap;
  }

  #history-link {
    position: fixed;
    bottom: 1.2rem;
    right: 1.5rem;
    font-size: 0.65rem;
    color: #3a3a50;
    text-decoration: none;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 20;
    transition: color 0.4s;
  }
  #history-link:hover { color: #7a7aaa; }

  #petal-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
    pointer-events: none;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fallPetal linear infinite;
  }

  @keyframes fallPetal {
    0%   { opacity: 0; transform: translateY(-20px) rotate(0deg) scale(0.8); }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(1.1); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulseGold {
    0%,100% { opacity: 0; }
    5%       { opacity: 1; }
    50%      { opacity: 0.75; box-shadow: 0 0 20px rgba(245,208,138,0.2); }
    95%      { opacity: 1; }
  }

  /* mouse ripple */
  .ripple {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(245,208,138,0.5);
    animation: expandRipple 1.6s ease-out forwards;
    pointer-events: none;
    z-index: 8;
  }
  @keyframes expandRipple {
    from { width: 0; height: 0; opacity: 0.8; transform: translate(-50%,-50%); }
    to   { width: 200px; height: 200px; opacity: 0; transform: translate(-50%,-50%); }
  }
</style>
</head>
<body>

<canvas id="sky"></canvas>

<div id="petal-layer"></div>

<div id="ui">
  <div id="headline">Earth Hour</div>
  <div id="sub">March 28, 2026 · The Stars Remember</div>
  <div id="clock">--:--:--</div>
  <div id="date-line">Saturday · Day One · First Light of This Site</div>
  <div id="earth-hour-badge">🌍 Switch off. Look up. Breathe.</div>
</div>

<div id="hint">click anywhere · the sky listens</div>
<a href="./history.html" id="history-link">history</a>

<script>
/* ─── STARFIELD ─── */
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let W, H, stars = [], shooters = [], mouse = {x: 0.5, y: 0.5};
const NUM_STARS = 340;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initStars();
}

function rand(a, b) { return Math.random() * (b - a) + a; }

function initStars() {
  stars = [];
  for (let i = 0; i < NUM_STARS; i++) {
    stars.push({
      x: rand(0, W),
      y: rand(0, H),
      r: rand(0.3, 2.2),
      baseAlpha: rand(0.15, 0.85),
      alpha: 0,
      speed: rand(0.0003, 0.002),
      phase: rand(0, Math.PI * 2),
      hue: rand(200, 260),
      color: Math.random() < 0.08 ? 'gold' : (Math.random() < 0.05 ? 'pink' : 'white'),
    });
  }
}

function spawnShooter() {
  shooters.push({
    x: rand(0, W * 0.7),
    y: rand(0, H * 0.4),
    len: rand(80, 200),
    speed: rand(6, 14),
    angle: Math.PI / 5,
    alpha: 1,
    life: 1,
  });
}

let t = 0;
function drawFrame() {
  t += 0.016;
  ctx.clearRect(0, 0, W, H);

  // deep gradient sky
  const grad = ctx.createRadialGradient(W*0.5, H*0.4, 0, W*0.5, H*0.5, Math.max(W,H)*0.75);
  grad.addColorStop(0, '#0f0f22');
  grad.addColorStop(0.5, '#08080f');
  grad.addColorStop(1, '#04040a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // subtle aurora band
  const auroraY = H * 0.28 + Math.sin(t * 0.3) * 30;
  const aurora = ctx.createLinearGradient(0, auroraY - 80, 0, auroraY + 80);
  aurora.addColorStop(0, 'rgba(60,180,120,0)');
  aurora.addColorStop(0.4, 'rgba(60,180,120,0.025)');
  aurora.addColorStop(0.6, 'rgba(80,140,200,0.03)');
  aurora.addColorStop(1, 'rgba(80,140,200,0)');
  ctx.fillStyle = aurora;
  ctx.fillRect(0, auroraY - 80, W, 160);

  // parallax stars
  const dx = (mouse.x - 0.5) * 18;
  const dy = (mouse.y - 0.5) * 10;

  stars.forEach(s => {
    const wave = Math.sin(t * s.speed * 60 + s.phase);
    s.alpha = s.baseAlpha * (0.65 + 0.35 * wave);
    ctx.save();
    ctx.globalAlpha = s.alpha;
    let col;
    if (s.color === 'gold')  col = `hsl(45,90%,75%)`;
    else if (s.color === 'pink') col = `hsl(340,80%,80%)`;
    else col = `hsl(${s.hue},40%,90%)`;
    ctx.fillStyle = col;
    ctx.shadowBlur = s.r * 4;
    ctx.shadowColor = col;
    ctx.beginPath();
    ctx.arc(s.x + dx * (s.r / 2.5), s.y + dy * (s.r / 2.5), s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // shooting stars
  shooters = shooters.filter(sh => sh.life > 0);
  shooters.forEach(sh => {
    sh.life -= 0.018;
    sh.x += Math.cos(sh.angle) * sh.speed;
    sh.y += Math.sin(sh.angle) * sh.speed;
    ctx.save();
    ctx.globalAlpha = Math.max(0, sh.life * sh.alpha);
    const grad2 = ctx.createLinearGradient(
      sh.x - Math.cos(sh.angle)*sh.len, sh.y - Math.sin(sh.angle)*sh.len,
      sh.x, sh.y
    );
    grad2.addColorStop(0, 'rgba(255,255,220,0)');
    grad2.addColorStop(1, 'rgba(255,255,220,0.9)');
    ctx.strokeStyle = grad2;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sh.x - Math.cos(sh.angle)*sh.len, sh.y - Math.sin(sh.angle)*sh.len);
    ctx.lineTo(sh.x, sh.y);
    ctx.stroke();
    // tip glow
    ctx.beginPath();
    ctx.arc(sh.x, sh.y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,240,0.9)';
    ctx.fill();
    ctx.restore();
  });

  // Earth glow at bottom
  const earthGrad = ctx.createRadialGradient(W*0.5, H*1.08, 0, W*0.5, H*1.05, H*0.5);
  earthGrad.addColorStop(0, 'rgba(50,160,100,0.12)');
  earthGrad.addColorStop(0.4, 'rgba(40,100,180,0.06)');
  earthGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = earthGrad;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(drawFrame);
}

// shooter timer
setInterval(() => {
  if (Math.random() < 0.55) spawnShooter();
}, 2800);

window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX / W;
  mouse.y = e.clientY / H;
});

window.addEventListener('click', e => {
  // ripple
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.clientX + 'px';
  r.style.top  = e.clientY + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 1700);
  // extra shooter
  spawnShooter(); spawnShooter();
});

resize();
drawFrame();

/* ─── CLOCK ─── */
function pad(n) { return String(n).padStart(2,'0'); }
function tick() {
  const now = new Date();
  document.getElementById('clock').textContent =
    pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
}
tick();
setInterval(tick, 1000);

/* ─── PETALS ─── */
const petalLayer = document.getElementById('petal-layer');
const PETAL_COLORS = [
  'rgba(249,180,200,0.55)', 'rgba(255,200,215,0.45)',
  'rgba(240,160,185,0.5)',  'rgba(255,220,235,0.4)',
  'rgba(200,220,255,0.35)'
];

function spawnPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  const size = Math.random() * 10 + 6;
  const left = Math.random() * 100;
  const dur  = Math.random() * 12 + 10;
  const delay = Math.random() * 8;
  const col   = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
  p.style.cssText = `
    width:${size}px; height:${size * 0.7}px;
    left:${left}vw;
    top: -20px;
    background: ${col};
    animation-duration: ${dur}s;
    animation-delay: ${delay}s;
    transform: rotate(${Math.random()*360}deg);
  `;
  petalLayer.appendChild(p);
  setTimeout(() => p.remove(), (dur + delay) * 1000 + 500);
}

// initial burst then trickle
for (let i = 0; i < 22; i++) spawnPetal();
setInterval(spawnPetal, 900);
</script>
</body>
</html>
