name: Daily Reinvention

on:
  schedule:
    - cron: '0 6 * * *'   # 6am UTC every day
  workflow_dispatch:        # manual trigger for testing
  push:
    branches:
      - main

jobs:
  reinvent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEV_MODE: ${{ vars.DEV_MODE }}
          AGENT_PROMPT: ${{ vars.AGENT_PROMPT }}
        run: node agent/reinvent.js

      - name: Commit and push
        run: |
          git config user.name "404ever Agent"
          git config user.email "agent@404ever.art"
          git add index.html history.json
          git add archive/ 2>/dev/null || true
          git commit -m "$(date +%Y-%m-%d): $(cat .agent_title)"
          git push

      - name: Upload to GitHub Pages
        if: vars.PUBLISH_GITHUB_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: vars.PUBLISH_GITHUB_PAGES == 'true'
        id: deploy
        uses: actions/deploy-pages@v4
